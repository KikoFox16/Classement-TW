<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classement - Territory War</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #000000 100%);
            --panel-bg: rgba(255, 255, 255, 0.05);
            --accent-gold: #f1c40f;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --text-main: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .player-card {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            transition: transform 0.2s;
        }

        .player-card:active {
            transform: scale(0.98);
        }

        .main-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .rank-badge {
            font-weight: 900;
            font-size: 1.2rem;
            width: 35px;
            color: rgba(255,255,255,0.3);
        }

        .player-identity {
            flex-grow: 1;
        }

        .player-name {
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 2px;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        .stats-summary {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 4px;
        }

        .zones-total {
            background: rgba(46, 204, 113, 0.2);
            color: var(--accent-green);
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255,255,255,0.1);
        }

        .level-stat {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 8px 4px;
            border-radius: 12px;
        }

        .level-stat .label {
            display: block;
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 2px;
        }

        .level-stat .value {
            font-weight: bold;
            font-size: 0.9rem;
        }

        .lv1 { color: var(--accent-blue); }
        .lv2 { color: #9b59b6; }
        .lv3 { color: var(--accent-gold); }
        .lv4 { color: #e74c3c; }

        .top-1 { border: 1px solid var(--accent-gold); }
        .top-1 .rank-badge { color: var(--accent-gold); }

        .nav-footer {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-play { background: var(--accent-green); color: #000; }
        .btn-live { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Classement</h1>
        <div style="font-size: 0.8rem; color: #666; margin-top: 5px;">Territory War • Live Update</div>
    </header>

    <div id="leaderboard" class="leaderboard-list"></div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    // CONFIGURATION
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1499848592502948023/UdkDYEnweBkJBRo7ZmtWwhgSw152y9hvnUcPWrcOoJtvahPpx8RuF7TiO5IfnepGSklG"; 

    const firebaseConfig = {
        apiKey: "AIzaSyBqRloMg22mDsnfqhNK77vREQYtLFBgyf0",
        authDomain: "territory-war-acfca.firebaseapp.com",
        databaseURL: "https://territory-war-acfca-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "territory-war-acfca"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const titles = [
        "Exilé", "Pilleur", "Chef de Meute", "Capitaine de Mercenaires", "Seigneur de Guerre",
        "Baron de Fer", "Vicomte de Sang", "Comte Palatin", "Duc Souverain", "Héraut de la Victoire",
        "Archiduc", "Prince Héritier", "Haut-Roi", "Protecteur du Royaume", "Grand Unificateur",
        "César", "Empereur Auguste", "Suzerain des Nations", "Monarque Absolu", "Autocrate de l'Aube",
        "Maître de la Destinée", "Architecte des Mondes", "Dominateur Stellaire", "Nexus de la Création", "Singularité Suprême"
    ];

    function getRankStyle(zones) {
        const index = Math.min(Math.floor(zones / 10), titles.length - 1);
        const intensity = Math.min(zones / 250, 1);
        const hue = 200 - (intensity * 200);
        const color = zones < 10 ? "#888" : `hsl(${hue}, 80%, 60%)`;
        return { title: titles[index], color: color, shadow: zones >= 10 ? `0 0 ${index * 2}px ${color}` : 'none' };
    }

    async function sendDiscordUpdate(sortedPlayers) {
        const now = Date.now();
        const lastUpdate = localStorage.getItem('lastWebhookTime');
        
        if (lastUpdate && (now - lastUpdate < 3600000)) return;

        const top10 = sortedPlayers.slice(0, 10);
        let description = "🏆 **TOP 10 CONQUÉRANTS**\n\n";
        
        top10.forEach((p, i) => {
            const title = getRankStyle(p.zonesCount).title;
            const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : "🔹";
            description += `${medal} **${p.name}**\n└ *${title}* • **${p.zonesCount} zones**\n\n`;
        });

        const payload = {
            embeds: [{
                title: "Territory War - Classement",
                description: description,
                color: 15844367,
                timestamp: new Date().toISOString()
            }],
            components: [
                {
                    type: 1,
                    components: [
                        {
                            type: 2,
                            label: "Jouer",
                            style: 5,
                            url: "https://kikofox16.github.io/Territory-War/"
                        },
                        {
                            type: 2,
                            label: "Classement en direct",
                            style: 5,
                            url: "https://kikofox16.github.io/Classement-TW/"
                        }
                    ]
                }
            ]
        };

        try {
            await fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            localStorage.setItem('lastWebhookTime', now);
        } catch (e) { console.error(e); }
    }

    const lbContainer = document.getElementById('leaderboard');

    onValue(ref(db), (snapshot) => {
        const data = snapshot.val();
        const users = data.users || {};
        const zones = data.zones || {};
        const playerStats = {};
        
        Object.keys(users).forEach(uid => {
            playerStats[uid] = {
                name: users[uid].username,
                color: users[uid].color,
                coins: users[uid].coins || 0,
                zonesCount: users[uid].zonesCount || 0,
                l1: 0, l2: 0, l3: 0, l4: 0
            };
        });

        Object.values(zones).forEach(z => {
            if (z.ownerId && playerStats[z.ownerId]) {
                const lvl = z.level || 1;
                if (lvl === 1) playerStats[z.ownerId].l1++;
                else if (lvl === 2) playerStats[z.ownerId].l2++;
                else if (lvl === 3) playerStats[z.ownerId].l3++;
                else if (lvl >= 4) playerStats[z.ownerId].l4++;
            }
        });

        const sorted = Object.values(playerStats).sort((a, b) => b.zonesCount - a.zonesCount);
        sendDiscordUpdate(sorted);

        lbContainer.innerHTML = "";
        sorted.forEach((p, index) => {
            const rankStyle = getRankStyle(p.zonesCount);
            const card = document.createElement('div');
            card.className = `player-card ${index === 0 ? 'top-1' : ''}`;
            card.innerHTML = `
                <div class="main-info">
                    <div class="rank-badge">#${index + 1}</div>
                    <div class="player-identity">
                        <span class="player-title" style="color: ${rankStyle.color}; text-shadow: ${rankStyle.shadow}">${rankStyle.title}</span>
                        <div class="player-name"><span class="color-dot" style="color: ${p.color}; background: ${p.color}"></span>${p.name}</div>
                        <div class="stats-summary">💰 ${p.coins.toLocaleString()} pièces</div>
                    </div>
                    <div class="zones-total">${p.zonesCount} 🚩</div>
                </div>
                <div class="details-grid">
                    <div class="level-stat"><span class="label">Niv. 1</span><span class="value lv1">${p.l1}</span></div>
                    <div class="level-stat"><span class="label">Niv. 2</span><span class="value lv2">${p.l2}</span></div>
                    <div class="level-stat"><span class="label">Niv. 3</span><span class="value lv3">${p.l3}</span></div>
                    <div class="level-stat"><span class="label">Niv. 4</span><span class="value lv4">${p.l4}</span></div>
                </div>
            `;
            lbContainer.appendChild(card);
        });
    });
</script>

</body>
</html>
